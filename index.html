<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자동화 로그 스캐너</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1200px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 상단 2단 레이아웃 (좌: 입력폼, 우: AI 도구) */
        .top-section { display: flex; gap: 20px; margin-bottom: 20px; }
        
        /* 왼쪽 입력 폼 영역 */
        .left-panel { flex: 1; border: 2px solid #343a40; border-radius: 4px; overflow: hidden; }
        .form-row { display: flex; border-bottom: 1px solid #dee2e6; }
        .form-row:last-child { border-bottom: none; }
        .form-label { width: 100px; background: #f8f9fa; padding: 12px; font-weight: bold; font-size: 14px; display: flex; align-items: center; border-right: 1px solid #dee2e6; color: #333; }
        .form-input { flex: 1; padding: 8px; display: flex; align-items: center; }
        .form-input input, .form-input textarea { width: 100%; border: 1px solid #ced4da; padding: 8px; box-sizing: border-box; border-radius: 4px; font-family: inherit; font-size: 14px; }
        .form-input textarea { resize: vertical; min-height: 60px; }

        /* 오른쪽 AI 도구 영역 */
        .right-panel { flex: 1; border: 2px solid #343a40; border-radius: 4px; padding: 15px; display: flex; flex-direction: column; background: #f8f9fa; }
        #pasteArea { flex: 1; border: 2px dashed #adb5bd; border-radius: 4px; min-height: 250px; display: flex; align-items: center; justify-content: center; background: white; cursor: pointer; color: #6c757d; font-weight: bold; overflow: hidden; margin-bottom: 15px; }
        #pasteArea img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-extract { background: #28a745; color: white; border: none; padding: 15px; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-extract:hover { background: #218838; }

        /* 하단 전송 버튼 영역 */
        .bottom-section { display: flex; gap: 10px; border-top: 2px solid #343a40; padding-top: 20px; }
        .btn-mail { flex: 1; background: #007bff; color: white; border: none; padding: 15px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; word-break: keep-all; line-height: 1.4; transition: 0.2s; }
        .btn-mail:hover { background: #0056b3; }
        .btn-duty { background: #dc3545; }
        .btn-duty:hover { background: #c82333; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="left-panel">
            <div class="form-row"><div class="form-label">기번</div><div class="form-input"><input type="text" id="regNo"></div></div>
            <div class="form-row"><div class="form-label">AS/AP</div><div class="form-input"><input type="text" id="asAp"></div></div>
            <div class="form-row"><div class="form-label">DEFECT</div><div class="form-input"><textarea id="defect"></textarea></div></div>
            <div class="form-row"><div class="form-label">적용 근거</div><div class="form-input"><input type="text" id="reason"></div></div>
            <div class="form-row"><div class="form-label">ATA</div><div class="form-input"><input type="text" id="ata"></div></div>
            <div class="form-row"><div class="form-label">위탁</div><div class="form-input"><input type="text" id="handover"></div></div>
            <div class="form-row"><div class="form-label">편명</div><div class="form-input"><input type="text" id="flightNo"></div></div>
            <div class="form-row"><div class="form-label">구간</div><div class="form-input"><input type="text" id="leg"></div></div>
        </div>

        <div class="right-panel">
            <div id="pasteArea">여기를 클릭하고 캡처한 이미지를 붙여넣으세요 (Ctrl+V)</div>
            <button class="btn-extract" onclick="extractText()">✨ AI 텍스트 추출 (임시)</button>
        </div>
    </div>

    <div class="bottom-section">
        <button class="btn-mail" onclick="sendMail('OCC')">DISPATCH APPROVAL<br>TO OCC</button>
        <button class="btn-mail" onclick="sendMail('ICN')">DISPACH APPROVAL E-MAIL<br>TO ICN</button>
        <button class="btn-mail" onclick="sendMail('GMP')">DISPACH APPROVAL E-MAIL<br>TO GMP</button>
        <button class="btn-mail btn-duty" onclick="sendMail('DUTY')">DEFER 전송<br>TO DUTY</button>
    </div>
</div>

<script>
    let fileToUpload = null;

    // 이미지 붙여넣기 기능
    document.getElementById('pasteArea').addEventListener('paste', (e) => {
        e.preventDefault(); 
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        let isImageFound = false;

        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
                fileToUpload = items[i].getAsFile();
                const url = URL.createObjectURL(fileToUpload);
                document.getElementById('pasteArea').innerHTML = `<img src="${url}">`;
                isImageFound = true;
                break;
            }
        }
        if (!isImageFound) alert("이미지를 붙여넣어 주세요!");
    });

    // 텍스트 추출 (AI가 분류하기 전이라 일단 DEFECT 칸에 몰아넣게 해두었습니다)
    async function extractText() {
        if (!fileToUpload) return alert("이미지를 먼저 붙여넣으세요!");
        const defectBox = document.getElementById('defect');
        defectBox.value = "AI가 문서를 분석 중입니다... ⏳";

        const formData = new FormData();
        formData.append("file", fileToUpload);

        try {
            const res = await fetch("/ocr", { method: "POST", body: formData });
            const data = await res.json();
            
            // 나중에 AI가 똑똑해지면 여기서 data.regNo, data.flightNo 등으로 나눠서 넣을 예정입니다.
            // 지금은 임시로 통째로 DEFECT 창에 넣습니다.
            defectBox.value = data.text;
        } catch (e) {
            alert("서버 오류 발생!");
            defectBox.value = "";
        }
    }

    // 각 부서별 메일 전송 버튼 클릭 시 동작
    function sendMail(target) {
        // 입력된 정보들 가져오기
        const regNo = document.getElementById('regNo').value;
        const defect = document.getElementById('defect').value;
        
        alert(`[${target}] 부서로 메일 전송 준비 완료!\n\n(나중에 파이썬 이메일 기능과 연결될 버튼입니다.)\n기번: ${regNo}\n내용: ${defect}`);
    }
</script>

</body>
</html>
