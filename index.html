<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Log Analyzer (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 폰트 및 세부 스타일 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', 'Pretendard', sans-serif; }
        
        /* 로딩 애니메이션 */
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 결과 영역 스크롤바 디자인 */
        #resultArea::-webkit-scrollbar { width: 6px; }
        #resultArea::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* 이미지 회전 전환 효과 */
        #preview { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        
        <header class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-blue-400">PRO-MAINTENANCE AI <span class="text-xs font-normal text-slate-400 ml-2">v3.0 Pro</span></h1>
                <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold">Aviation Maintenance Log Intelligent Analyzer</p>
            </div>
            <div class="text-right hidden sm:block">
                <p class="text-xs text-slate-300 font-medium">또는 화면 어디서든 <span class="text-yellow-400">Ctrl+V</span>로 붙여넣고,</p>
                <p class="text-xs text-slate-300 font-medium"><span class="text-yellow-400">방향키</span>로 회전 후 <span class="text-yellow-400">Enter</span>로 분석하세요.</p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row p-6 gap-8">
            
            <div class="w-full lg:w-1/2 space-y-4">
                <div id="dropZone" class="group relative border-4 border-dashed border-slate-200 rounded-xl h-[500px] flex flex-col items-center justify-center bg-slate-50 hover:bg-white hover:border-blue-400 transition-all overflow-hidden cursor-pointer">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <div id="dropContent" class="text-center group-hover:scale-105 transition-transform">
                        <div class="bg-blue-100 text-blue-600 p-4 rounded-full inline-block mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                        <p class="text-slate-600 font-bold">로그북 이미지 붙여넣기 (Ctrl+V)</p>
                        <p class="text-slate-400 text-sm">또는 클릭하여 파일 선택</p>
                    </div>
                    <img id="preview" class="hidden max-h-full max-w-full select-none pointer-events-none">
                    
                    <div id="loadingOverlay" class="absolute inset-0 bg-white/80 flex flex-col items-center justify-center hidden z-10">
                        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                        <p class="text-blue-600 font-bold animate-pulse">지능형 분석 및 보정 중...</p>
                    </div>
                </div>

                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <div class="flex gap-2">
                        <button onclick="rotate(-90)" class="bg-white border border-slate-300 hover:bg-slate-100 px-4 py-2 rounded-md text-sm font-semibold flex items-center transition">
                            <span class="mr-1">↺</span> 좌 (←)
                        </button>
                        <button onclick="rotate(90)" class="bg-white border border-slate-300 hover:bg-slate-100 px-4 py-2 rounded-md text-sm font-semibold flex items-center transition">
                            우 (→) <span class="ml-1">↻</span>
                        </button>
                    </div>
                    <button id="analyzeBtn" onclick="startAnalysis()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-md font-bold shadow-lg transition active:scale-95">
                        AI 분석 시작 (Enter)
                    </button>
                </div>
            </div>

            <div class="w-full lg:w-1/2 flex flex-col h-[560px]">
                <div class="bg-slate-50 rounded-xl border border-slate-200 flex flex-col h-full overflow-hidden shadow-inner">
                    <div class="bg-white p-4 border-b flex justify-between items-center">
                        <h3 class="text-lg font-extrabold text-slate-800 cursor-help select-none" ondblclick="openLearningModal()" title="정비사 전용 오답 학습 창 열기">
                            📋 Items <span class="text-xs font-normal text-slate-400 ml-2 font-mono italic">(Smart Learning Enabled)</span>
                        </h3>
                        <div id="statusBadge" class="hidden px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded uppercase tracking-tighter">AI Corrected</div>
                    </div>

                    <div id="resultArea" class="p-4 overflow-y-auto flex-grow space-y-4">
                        <div class="text-center text-slate-400 mt-20">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                            <p>이미지를 업로드하고 분석을 진행하세요.</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="sendTo('OCC')" class="bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-black text-lg shadow-xl transition transform active:scale-95 flex flex-col items-center justify-center">
                        <span>OCC 전송</span>
                        <span class="text-[10px] opacity-70 font-normal">SHORTCUT: F8</span>
                    </button>
                    <button onclick="sendTo('DUTY')" class="bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-xl font-black text-lg shadow-xl transition transform active:scale-95 flex flex-col items-center justify-center">
                        <span>DUTY 전송</span>
                        <span class="text-[10px] opacity-70 font-normal">SHORTCUT: F9</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="learningModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="bg-blue-600 p-4 text-white">
                <h3 class="font-bold text-lg">AI 지능 교정 학습</h3>
                <p class="text-xs opacity-80">AI가 틀린 단어를 입력하면 다음부터 자동으로 바뀝니다.</p>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">AI가 잘못 읽은 외계어</label>
                    <input id="wrongWord" type="text" placeholder="예: PLEM" class="w-full border-2 border-slate-100 rounded-lg p-3 outline-none focus:border-blue-500 transition uppercase font-mono">
                </div>
                <div class="text-center">
                    <div class="inline-block bg-slate-100 rounded-full p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">내가 의도한 정상 정비용어</label>
                    <input id="rightWord" type="text" placeholder="예: PRIM" class="w-full border-2 border-slate-100 rounded-lg p-3 outline-none focus:border-blue-500 transition uppercase font-mono">
                </div>
            </div>
            <div class="bg-slate-50 p-4 flex gap-2 justify-end">
                <button onclick="closeLearningModal()" class="px-6 py-2 text-slate-500 font-bold hover:bg-slate-200 rounded-lg transition">취소</button>
                <button onclick="saveLearning()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 shadow-md transition">학습 데이터 저장</button>
            </div>
        </div>
    </div>

    <script>
        let currentRotation = 0;
        let isProcessing = false;
        let lastImageBlob = null;

        /**
         * 1. ⌨️ 풀-키보드 컨트롤러 (Shortcuts)
         */
        document.addEventListener('keydown', (e) => {
            if (isProcessing) return;

            const isTyping = ['INPUT', 'TEXTAREA'].includes(e.target.tagName);

            // [F8, F9] 전송 단축키 - 어떤 상황에서도 즉시 실행
            if (e.key === 'F8') { e.preventDefault(); sendTo('OCC'); return; }
            if (e.key === 'F9') { e.preventDefault(); sendTo('DUTY'); return; }

            // [Enter, 방향키] - 타이핑 중이 아닐 때만 작동
            if (!isTyping) {
                if (e.key === 'Enter') { e.preventDefault(); startAnalysis(); }
                if (e.key === 'ArrowLeft') { e.preventDefault(); rotate(-90); }
                if (e.key === 'ArrowRight') { e.preventDefault(); rotate(90); }
            }
        });

        /**
         * 2. 🖼️ 이미지 처리 로직 (Paste / Drop / Rotation)
         */
        window.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const blob = item.getAsFile();
                    displayImage(blob);
                }
            }
        });

        const dropZone = document.getElementById('dropZone');
        dropZone.onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => displayImage(e.target.files[0]);

        function displayImage(blob) {
            if (!blob) return;
            lastImageBlob = blob;
            const url = URL.createObjectURL(blob);
            const preview = document.getElementById('preview');
            const content = document.getElementById('dropContent');
            
            preview.src = url;
            preview.classList.remove('hidden');
            content.classList.add('hidden');
            currentRotation = 0;
            preview.style.transform = `rotate(0deg)`;
        }

        function rotate(deg) {
            if (!lastImageBlob) return;
            currentRotation = (currentRotation + deg) % 360;
            document.getElementById('preview').style.transform = `rotate(${currentRotation}deg)`;
        }

        /**
         * 3. 🚀 AI 분석 요청 (OCR)
         */
        async function startAnalysis() {
            if (!lastImageBlob || isProcessing) return;

            isProcessing = true;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('analyzeBtn').innerText = "분석 중...";

            const formData = new FormData();
            formData.append('file', lastImageBlob);

            try {
                const response = await fetch('/ocr', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                renderResults(data);
            } catch (err) {
                alert("분석 실패: " + err.message);
            } finally {
                isProcessing = false;
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('analyzeBtn').innerText = "AI 분석 시작 (Enter)";
            }
        }

        function renderResults(data) {
            const area = document.getElementById('resultArea');
            area.innerHTML = ''; // 초기화

            if (!data.items || data.items.length === 0) {
                area.innerHTML = `<p class="text-center text-red-500 mt-10 font-bold italic">추출된 항목이 없습니다. (이월 없음)</p>`;
                return;
            }

            // 상단 공통 정보 (RegNo 등) 표시
            const headerInfo = document.createElement('div');
            headerInfo.className = "bg-white p-3 rounded-lg border border-blue-100 flex justify-between text-xs font-bold mb-4";
            headerInfo.innerHTML = `
                <span>REG: <span class="text-blue-600">${data.regNo || 'N/A'}</span></span>
                <span>FLT: <span class="text-blue-600">${data.flightNo || 'N/A'}</span></span>
                <span>ROUTE: <span class="text-blue-600">${data.legFrom || '?'} → ${data.legTo || '?'}</span></span>
            `;
            area.appendChild(headerInfo);

            // 아이템 리스트 생성
            data.items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-2 relative group hover:border-blue-300 transition";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="bg-slate-800 text-white px-2 py-0.5 rounded text-[10px] font-bold">ITEM ${idx+1}</span>
                        <span class="text-blue-600 font-black text-xs">${item.asAp || ''}</span>
                    </div>
                    <textarea class="w-full bg-slate-50 border-none rounded p-1 text-sm font-semibold focus:ring-0 resize-none h-auto" rows="2">${item.defect}</textarea>
                    <div class="flex gap-2 text-[11px] font-bold">
                        <span class="text-slate-400 italic">ATA: <input class="w-10 bg-transparent border-b border-slate-200 outline-none" value="${item.ata}"></span>
                        <span class="text-slate-400 italic">REF: <input class="w-24 bg-transparent border-b border-slate-200 outline-none" value="${item.reason}"></span>
                    </div>
                `;
                area.appendChild(div);
            });
            document.getElementById('statusBadge').classList.remove('hidden');
        }

        /**
         * 4. 🤫 오답 학습 로직 (Stealth Learning)
         */
        function openLearningModal() { 
            document.getElementById('learningModal').classList.remove('hidden'); 
            document.getElementById('wrongWord').focus();
        }
        function closeLearningModal() { document.getElementById('learningModal').classList.add('hidden'); }

        async function saveLearning() {
            const wrong = document.getElementById('wrongWord').value.trim();
            const right = document.getElementById('rightWord').value.trim();
            if(!wrong || !right) return alert("오답과 정답을 모두 입력해주세요.");

            try {
                await fetch('/save_learning', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({wrong, right})
                });
                alert(`학습 완료!\n이제 모든 분석 결과에서 "${wrong}"은 "${right}"로 자동 변환됩니다.`);
                closeLearningModal();
                // 초기화
                document.getElementById('wrongWord').value = '';
                document.getElementById('rightWord').value = '';
            } catch (err) {
                alert("저장 오류: " + err.message);
            }
        }

        /**
         * 5. 📧 전송 로직
         */
        function sendTo(target) {
            alert(`[${target}] 으로 정비 로그 데이터를 즉시 전송합니다.`);
            // 여기에 실제 전송 API 연동 (send_email 등)
        }
    </script>
</body>
</html>
