<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자동화 로그 스캐너 PRO</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg-color: #f4f7f6;
            --border: #dcdde1;
        }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1300px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 24px; }
        
        .top-section { display: flex; gap: 25px; margin-bottom: 20px; }
        
        /* 왼쪽 입력 폼 영역 */
        .left-panel { flex: 1.2; display: flex; flex-direction: column; gap: 15px; }
        
        /* 고정 필드 영역 */
        .static-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; align-items: center; background: white; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .input-group label { background: var(--primary); color: white; padding: 10px 15px; font-weight: bold; font-size: 13px; width: 60px; text-align: center; flex-shrink: 0; }
        .input-group input { flex: 1; border: none; padding: 10px; font-size: 14px; outline: none; }
        
        /* 구간(Leg) 입력 특수 디자인 */
        .leg-inputs { display: flex; align-items: center; padding: 0 10px; width: 100%; }
        .leg-inputs input { width: 50px; text-align: center; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid var(--border); border-radius: 0; padding: 5px; }
        .leg-inputs input:focus { border-bottom-color: var(--secondary); }
        .leg-inputs span { margin: 0 10px; color: #7f8c8d; font-weight: bold; }

        /* 체크박스 특수 디자인 */
        .checkbox-group { display: flex; align-items: center; padding-left: 15px; gap: 10px; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        
        /* 동적 필드 영역 (AS/AP, DEFECT 등) */
        .dynamic-container { border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: white; }
        .dynamic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: var(--primary); }
        .btn-add { background: var(--secondary); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 1; transition: 0.2s; }
        .btn-add:hover { background: #2980b9; transform: scale(1.1); }
        
        .defect-row { display: grid; grid-template-columns: 60px 1fr 150px 80px; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); align-items: start; }
        .defect-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .defect-row .idx { font-weight: bold; color: var(--secondary); text-align: center; padding-top: 10px; }
        .defect-row input, .defect-row textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 8px; box-sizing: border-box; font-family: inherit; font-size: 13px; }
        .defect-row textarea { resize: vertical; min-height: 40px; }

        /* 오른쪽 AI 도구 영역 */
        .right-panel { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }
        #pasteArea { flex: 1; border: 2px dashed #bdc3c7; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafbfc; cursor: pointer; color: #7f8c8d; font-weight: bold; overflow: hidden; min-height: 300px; transition: 0.3s; }
        #pasteArea:hover { border-color: var(--secondary); background: white; }
        #pasteArea img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-extract { background: var(--success); color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2); }
        .btn-extract:hover { background: #219653; transform: translateY(-2px); }

        /* 하단 버튼 영역 */
        .bottom-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 10px; }
        .btn-mail { background: #34495e; color: white; border: none; padding: 15px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; line-height: 1.4; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-mail:hover { background: #2c3e50; transform: translateY(-2px); }
        .btn-duty { background: var(--danger); }
        .btn-duty:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>✈️ AI Log Scanner PRO</h1>
    </div>

    <div class="top-section">
        <div class="left-panel">
            <div class="static-fields">
                <div class="input-group">
                    <label>기번</label>
                    <input type="text" id="regNo" placeholder="예: HL8210">
                </div>
                <div class="input-group">
                    <label>위탁</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="handover">
                        <span style="font-size: 13px; color: #555;">(타사 정비사 날인 시 체크)</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>구간</label>
                    <div class="leg-inputs">
                        <input type="text" id="legFrom" maxlength="3" placeholder="ICN">
                        <span>▶</span>
                        <input type="text" id="legTo" maxlength="3" placeholder="SFO">
                    </div>
                </div>
                <div class="input-group">
                    <label>편명</label>
                    <input type="text" id="flightNo" placeholder="자동 매칭됨" readonly style="background:#e9ecef; cursor:not-allowed;">
                </div>
            </div>

            <div class="dynamic-container">
                <div class="dynamic-header">
                    <span>결함 및 조치내역 (Defect & Action)</span>
                    <button class="btn-add" onclick="addDefectRow()" title="항목 추가">+</button>
                </div>
                <div id="defectRowsContainer">
                    </div>
            </div>
        </div>

        <div class="right-panel">
            <div id="pasteArea">
                <span style="font-size: 30px; margin-bottom: 10px;">📋</span>
                여기를 클릭하고 이미지를 붙여넣으세요 (Ctrl+V)
            </div>
            <button class="btn-extract" onclick="extractText()">✨ AI 자동 분석 실행</button>
        </div>
    </div>

    <div class="bottom-section">
        <button class="btn-mail" onclick="sendMail('OCC')">DISPATCH APPROVAL<br>TO OCC</button>
        <button class="btn-mail" onclick="sendMail('ICN')">DISPATCH APPROVAL<br>TO ICN</button>
        <button class="btn-mail" onclick="sendMail('GMP')">DISPATCH APPROVAL<br>TO GMP</button>
        <button class="btn-mail btn-duty" onclick="sendMail('DUTY')">DEFER 전송<br>TO DUTY</button>
    </div>
</div>

<script>
    let fileToUpload = null;
    let rowCount = 0;

    // ==========================================
    // 📊 스프레드시트 매칭용 임시 데이터 (RAW DATA)
    // 실제 시트를 읽어오는 대신, 여기에 데이터를 붙여넣어 사용합니다.
    // ==========================================
    const DB = {
        // 구간 -> 편명 매칭 테이블
        flightMatching: {
            "ICN-SFO": "OZ212",
            "SFO-ICN": "OZ211",
            "ICN-JFK": "OZ222",
            // 여기에 계속 추가
        },
        // DEFECT 키워드 -> ATA 매칭 테이블
        ataMatching: [
            { keyword: "INTERPHONE", ata: "23" },
            { keyword: "TIRE", ata: "32" },
            { keyword: "BRAKE", ata: "32" },
            { keyword: "SEAT", ata: "25" },
            { keyword: "LIGHT", ata: "33" }
            // 여기에 계속 추가 (위에서부터 아래로 먼저 검색됨)
        ]
    };

    // 초기 1개 행 생성
    window.onload = () => addDefectRow();

    // 행 추가 함수
    function addDefectRow() {
        rowCount++;
        const container = document.getElementById('defectRowsContainer');
        const row = document.createElement('div');
        row.className = 'defect-row';
        row.id = `row-${rowCount}`;
        
        row.innerHTML = `
            <div class="idx">${rowCount}. <input type="text" id="asAp-${rowCount}" placeholder="AS/AP" style="margin-top:5px; text-align:center;"></div>
            <textarea id="defect-${rowCount}" placeholder="DEFECT 내용 입력 (키워드 입력 시 ATA 자동 매칭)" oninput="autoMatchATA(${rowCount})"></textarea>
            <input type="text" id="reason-${rowCount}" placeholder="적용근거 (예: MEL 34-11)">
            <input type="text" id="ata-${rowCount}" placeholder="ATA">
        `;
        container.appendChild(row);
    }

    // 초기화 및 데이터 채우기 (AI 응답 후 호출)
    function fillData(data) {
        // 고정 필드 채우기
        document.getElementById('regNo').value = data.regNo || "";
        document.getElementById('handover').checked = data.isHandover || false;
        
        if (data.legFrom) document.getElementById('legFrom').value = data.legFrom;
        if (data.legTo) document.getElementById('legTo').value = data.legTo;
        checkFlightMatch(); // 편명 자동 매칭 실행

        // 동적 필드 채우기
        const container = document.getElementById('defectRowsContainer');
        container.innerHTML = ''; // 기존 행 초기화
        rowCount = 0;

        if (data.items && data.items.length > 0) {
            data.items.forEach(item => {
                addDefectRow();
                document.getElementById(`asAp-${rowCount}`).value = item.asAp || "";
                document.getElementById(`defect-${rowCount}`).value = item.defect || "";
                document.getElementById(`reason-${rowCount}`).value = item.reason || "";
                
                // ATA는 AI가 주면 쓰고, 없으면 로컬 DB에서 자동 매칭
                if (item.ata) {
                    document.getElementById(`ata-${rowCount}`).value = item.ata;
                } else {
                    autoMatchATA(rowCount);
                }
            });
        } else {
            addDefectRow(); // 데이터가 없어도 1줄은 빈칸으로 유지
        }
    }

    // ==========================================
    // 💡 자동 매칭 이벤트 로직
    // ==========================================
    
    // 1. 구간 3글자 입력 시 다음 칸 이동 & 편명 매칭
    const legFrom = document.getElementById('legFrom');
    const legTo = document.getElementById('legTo');
    
    legFrom.addEventListener('input', function() {
        if (this.value.length === 3) {
            legTo.focus(); // 자동으로 To 칸으로 이동
            checkFlightMatch();
        }
    });
    
    legTo.addEventListener('input', function() {
        if (this.value.length === 3) {
            checkFlightMatch();
            document.getElementById('flightNo').focus();
        }
    });

    // 편명 매칭 함수
    function checkFlightMatch() {
        const from = legFrom.value.toUpperCase();
        const to = legTo.value.toUpperCase();
        if (from.length === 3 && to.length === 3) {
            const route = `${from}-${to}`;
            const matchedFlight = DB.flightMatching[route];
            document.getElementById('flightNo').value = matchedFlight ? matchedFlight : "매칭없음(수동입력 요망)";
        }
    }

    // 2. DEFECT 내용 기반 ATA 자동 매칭
    function autoMatchATA(id) {
        const defectText = document.getElementById(`defect-${id}`).value.toUpperCase();
        const ataInput = document.getElementById(`ata-${id}`);
        
        let matched = false;
        for (let i = 0; i < DB.ataMatching.length; i++) {
            if (defectText.includes(DB.ataMatching[i].keyword)) {
                ataInput.value = DB.ataMatching[i].ata;
                ataInput.style.backgroundColor = "#e8f5e9"; // 매칭 성공 시 초록색 이펙트
                setTimeout(() => ataInput.style.backgroundColor = "white", 1000);
                matched = true;
                break;
            }
        }
        if(!matched && defectText.length === 0) ataInput.value = "";
    }

    // ==========================================
    // 이미지 붙여넣기 및 AI 통신 로직
    // ==========================================
    document.getElementById('pasteArea').addEventListener('paste', (e) => {
        e.preventDefault(); 
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        let isImageFound = false;

        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
                fileToUpload = items[i].getAsFile();
                const url = URL.createObjectURL(fileToUpload);
                document.getElementById('pasteArea').innerHTML = `<img src="${url}">`;
                isImageFound = true;
                break;
            }
        }
        if (!isImageFound) alert("이미지를 붙여넣어 주세요!");
    });

    async function extractText() {
        if (!fileToUpload) return alert("이미지를 먼저 붙여넣으세요!");
        
        const btn = document.querySelector('.btn-extract');
        btn.innerText = "분석 중... ⏳";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("file", fileToUpload);

        try {
            const res = await fetch("/ocr", { method: "POST", body: formData });
            const data = await res.json();
            
            if (data.error) {
                alert("서버 오류: " + data.error);
            } else {
                fillData(data); // AI가 준 JSON 데이터로 화면 싹 채우기
                alert("분석 완료!");
            }
        } catch (e) {
            alert("서버와 통신할 수 없습니다.");
        } finally {
            btn.innerText = "✨ AI 자동 분석 실행";
            btn.disabled = false;
        }
    }

    function sendMail(target) {
        alert(`[${target}] 로 전송 준비 완료!\n(이후 파이썬 메일 로직과 연동)`);
    }
</script>

</body>
</html>
