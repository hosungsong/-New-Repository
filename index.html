<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 텍스트 스캐너 & 메일 전송</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; font-size: 18px; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; }
        textarea, input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        textarea { height: 120px; resize: vertical; }
        #pasteArea { border: 2px dashed #4CAF50; height: 150px; display: flex; align-items: center; justify-content: center; color: #666; font-weight: bold; margin-bottom: 20px; background-color: #f9f9f9; cursor: pointer; }
        #pasteArea img { max-height: 100%; max-width: 100%; }
        button { background-color: #4CAF50; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .btn-mail { background-color: #008CBA; margin-top: 10px; }
        .btn-mail:hover { background-color: #0073e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>1. 이미지 붙여넣기 (Ctrl + V)</h2>
    <div id="pasteArea">이곳을 클릭하고 캡처한 이미지를 붙여넣으세요</div>
    <button onclick="extractText()">✨ 텍스트 추출하기</button>

    <h2>2. 추출된 텍스트 확인 및 수정</h2>
    <textarea id="extractedText" placeholder="이미지에서 추출된 텍스트가 여기에 자동으로 입력됩니다. 자유롭게 수정하세요!"></textarea>

    <h2>3. 추가 코멘트 입력</h2>
    <textarea id="additionalText" placeholder="전달할 추가 의견이나 메모를 이곳에 적어주세요."></textarea>

    <h2>4. 메일 전송 준비</h2>
    <input type="email" id="emailTo" placeholder="받는 사람의 이메일 주소를 입력하세요 (예: boss@company.com)">
    <button class="btn-mail" onclick="prepareEmail()">📧 메일 보내기</button>
</div>

<script>
    let selectedFile = null;

    // 이미지 붙여넣기 감지 로직
    document.getElementById('pasteArea').addEventListener('paste', function(e) {
        const items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
                selectedFile = items[i].getAsFile();
                const blobUrl = URL.createObjectURL(selectedFile);
                document.getElementById('pasteArea').innerHTML = `<img src="${blobUrl}">`;
                break;
            }
        }
    });

    // 텍스트 추출 요청 로직
    async function extractText() {
        if (!selectedFile) return alert("먼저 이미지를 붙여넣어 주세요!");
        
        const textBox = document.getElementById('extractedText');
        textBox.value = "AI가 이미지를 분석 중입니다... 잠시만 기다려주세요! ⏳";
        
        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
            // Render에 배포된 서버 주소로 자동 연결됨
            const response = await fetch("/ocr", { method: "POST", body: formData });
            const data = await response.json();
            textBox.value = data.text; // 추출된 텍스트를 박스에 쏙 넣음
        } catch (err) {
            textBox.value = "오류가 발생했습니다. 다시 시도해주세요.";
            alert("서버 연결 오류: " + err.message);
        }
    }

    // 메일 전송 준비 로직 (현재는 메일 본문을 완성해서 보여주는 역할)
    function prepareEmail() {
        const text = document.getElementById('extractedText').value;
        const extra = document.getElementById('additionalText').value;
        const email = document.getElementById('emailTo').value;

        if (!email) return alert("받는 사람의 이메일 주소를 적어주세요!");
        if (!text) return alert("추출된 텍스트가 없습니다!");

        // 최종적으로 메일에 들어갈 내용 조합
        const finalContent = `[AI 텍스트 분석 결과]\n${text}\n\n[추가 코멘트]\n${extra}`;
        
        alert("아래 내용으로 메일을 전송합니다!\n(아직 파이썬 서버에 비밀번호를 넣지 않아 실제 발송은 홀드 상태입니다.)\n\n" + finalContent);
        
        // 나중에 실제 전송 API( /send-email )를 여기에 연결할 예정입니다.
    }
</script>

</body>
</html>
