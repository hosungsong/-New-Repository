<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Log Scanner PRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --border: #ced4da; --bg: #f4f7f6; --warning: #e67e22; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1350px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); position: relative; }
        
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; }
        .btn-db { background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }

        .top-section { display: flex; gap: 25px; margin-bottom: 20px; }
        
        .left-panel { flex: 1.3; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        
        .static-fields { display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
        .input-group label { font-size: 12px; font-weight: bold; color: var(--primary); }
        
        .input-group .box { display: flex; background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; height: 38px; align-items: center; }
        .input-group input[type="text"] { flex: 1; border: none; padding: 0 8px; outline: none; font-size: 13px; height: 100%; min-width: 0; }
        
        .prefix { background: #e9ecef; color: #495057; font-weight: bold; padding: 0 10px; font-size: 13px; border-right: 1px solid var(--border); height: 100%; display: flex; align-items: center; }
        
        .leg-box { padding: 0 5px; gap: 2px; }
        .leg-box input { text-align: center; font-weight: bold; font-size: 11px; }

        .dynamic-container { border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: white; }
        .dynamic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        .btn-add { background: var(--secondary); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        
        .defect-grid { display: grid; grid-template-columns: 110px 1fr 140px 90px 30px; gap: 10px; align-items: start; }
        .defect-header-row { margin-bottom: 8px; padding-bottom: 5px; border-bottom: 2px solid var(--border); }
        .defect-header-row span { font-size: 11px; font-weight: bold; color: #7f8c8d; text-align: center; }
        
        .defect-row { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed var(--border); }
        .defect-row:last-child { border-bottom: none; }
        
        .as-ap-wrapper { display: flex; align-items: center; gap: 6px; height: 38px; }
        .idx-num { font-weight: bold; color: var(--secondary); font-size: 14px; width: 18px; text-align: right; }
        .toggle-box { display: flex; border: 1px solid var(--primary); border-radius: 4px; overflow: hidden; height: 100%; flex: 1; }
        .toggle-btn { flex: 1; background: white; color: var(--primary); border: none; font-weight: bold; font-size: 11px; cursor: pointer; }
        .toggle-btn.active { background: var(--primary); color: white; }

        .defect-row input, .defect-row textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 13px; min-height: 38px; }
        .defect-row textarea { resize: none; overflow: hidden; line-height: 1.4; } 
        
        .ata-wrapper { position: relative; }
        .ata-warning { color: var(--warning); font-size: 10px; font-weight: bold; position: absolute; bottom: -16px; left: 0; display: none; white-space: nowrap; }

        .right-panel { flex: 0.7; display: flex; flex-direction: column; gap: 15px; }
        #pasteArea { flex: 1; border: 2px dashed #bdc3c7; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fafbfc; min-height: 350px; position: relative; }
        #pasteArea img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; }
        
        .btn-reset-all { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; z-index: 10; }
        .btn-extract { background: #27ae60; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .bottom-section { display: flex; gap: 10px; margin-top: 10px; }
        .btn-mail { flex: 1; color: white; border: none; padding: 12px 5px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .bg-occ { background: #2980b9; } .bg-icn { background: #16a085; } .bg-gmp { background: #8e44ad; } .bg-duty { background: #e67e22; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-img { max-width: 90vw; max-height: 90vh; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h2>✈️ AI Log Scanner PRO</h2>
        <input type="file" id="csvFileInput" style="display: none;" accept=".csv" onchange="handleCSVUpload(event)">
        <button class="btn-db" onclick="document.getElementById('csvFileInput').click()">⚙️ 통합 DB 세팅 (CSV)</button>
    </div>

    <div class="top-section">
        <div class="left-panel">
            <div class="static-fields">
                <div class="input-group">
                    <label>기번</label>
                    <div class="box"><span class="prefix">HL</span><input type="text" id="regNo"></div>
                </div>
                <div class="input-group">
                    <label>편명</label>
                    <div class="box"><span class="prefix">OZ</span><input type="text" id="flightNo"></div>
                </div>
                <div class="input-group">
                    <label>구간</label>
                    <div class="box leg-box">
                        <input type="text" id="legFrom" maxlength="3" placeholder="FROM">
                        <button style="background:none; border:none; cursor:pointer;" onclick="swapLegs()">⇄</button>
                        <input type="text" id="legTo" maxlength="3" placeholder="TO">
                    </div>
                </div>
                <div class="input-group">
                    <label>위탁</label>
                    <div class="box checkbox-box" style="justify-content:center; cursor:pointer;" onclick="document.getElementById('handover').click();">
                        <input type="checkbox" id="handover" onclick="event.stopPropagation();">
                    </div>
                </div>
            </div>

            <div class="dynamic-container">
                <div class="dynamic-header">
                    <span>결함 및 조치내역</span>
                    <button class="btn-add" onclick="addRow()">+</button>
                </div>
                <div class="defect-grid defect-header-row">
                    <span>AS/AP</span>
                    <span>DEFECT</span>
                    <span>적용근거</span>
                    <span>ATA</span>
                    <span></span>
                </div>
                <div id="defectRowsContainer"></div>
            </div>
        </div>

        <div class="right-panel">
            <div id="pasteArea">📋 이미지를 붙여넣으세요</div>
            <button class="btn-extract" onclick="extractText()">✨ AI 분석 및 자동 매칭</button>
        </div>
    </div>

    <div class="bottom-section">
        <button class="btn-mail bg-occ">OCC 전송</button>
        <button class="btn-mail bg-icn">ICN 전송</button>
        <button class="btn-mail bg-gmp">GMP 전송</button>
        <button class="btn-mail bg-duty">DUTY 전송</button>
    </div>
</div>

<div class="modal-overlay" id="imageModal" onclick="this.style.display='none'">
    <img src="" class="modal-img" id="modalImg">
</div>

<script>
    let fileToUpload = null;
    let rowIdCounter = 0;
    let DB = { flights: {}, ataDatabase: [] };

    // 🎯 [수정됨] CSV 파싱: B열(코드) 빈칸 기억 로직 적용, C열(키워드)
    function handleCSVUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let newAta = [], newFlights = {};
            let lastAtaCode = ""; // 이전 코드를 기억할 변수
            
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    const type = parts[0].trim().toUpperCase();
                    let val = parts[1].trim(); // B열: 코드 또는 편명
                    const key = parts.length >= 3 ? parts[2].trim().toUpperCase() : ""; // C열: 키워드 또는 구간
                    
                    if (type === 'ATA') {
                        // B열(코드) 값이 있으면 기억하고, 비어있으면 이전 코드를 가져옴
                        if (val !== "") {
                            lastAtaCode = val;
                        } else {
                            val = lastAtaCode;
                        }
                        
                        // 헤더(제목줄) 무시하고 데이터만 푸시
                        if (key && val && key !== 'KEYWORD' && key !== '키워드' && val !== 'CODE' && val !== '코드') {
                            newAta.push({ keyword: key, code: val });
                        }
                    } 
                    else if (type === 'FLIGHT') {
                        if (key && val && key !== '구간' && val !== '편명') {
                            newFlights[key] = val; // key=구간, val=편명
                        }
                    }
                }
            });
            
            DB.ataDatabase = newAta;
            DB.flights = newFlights;
            localStorage.setItem('integratedDB', JSON.stringify(DB));
            alert(`✅ DB 세팅 완료!\n- ATA 키워드: ${newAta.length}개\n- 구간 정보: ${Object.keys(newFlights).length}개`);
            location.reload(); 
        };
        reader.readAsText(file);
    }

    function loadDB() {
        const saved = localStorage.getItem('integratedDB');
        if (saved) DB = JSON.parse(saved);
    }

    function autoResize(el) {
        el.style.height = '38px';
        el.style.height = el.scrollHeight + 'px';
    }

    function addRow(data = {}) {
        rowIdCounter++;
        const id = rowIdCounter;
        const container = document.getElementById('defectRowsContainer');
        const row = document.createElement('div');
        row.className = 'defect-grid defect-row';
        row.id = `row-${id}`;
        
        const isAp = data.asAp === 'AP';
        row.innerHTML = `
            <div class="as-ap-wrapper">
                <span class="idx-num"></span>
                <div class="toggle-box">
                    <button type="button" class="toggle-btn ${!isAp?'active':''}" onclick="setAsAp(${id},'AS')">AS</button>
                    <button type="button" class="toggle-btn ${isAp?'active':''}" onclick="setAsAp(${id},'AP')">AP</button>
                </div>
                <input type="hidden" id="asAp-${id}" value="${isAp?'AP':'AS'}">
            </div>
            <div><textarea id="defect-${id}" oninput="autoResize(this); matchATA(${id});">${data.defect || ''}</textarea></div>
            <div><input type="text" id="reason-${id}" value="${data.reason || ''}"></div>
            <div class="ata-wrapper">
                <input type="text" id="ata-${id}" value="${data.ata || ''}" oninput="checkATA(${id})">
                <span id="warning-${id}" class="ata-warning">⚠️ DB와 상이</span>
            </div>
            <button class="btn-remove" onclick="this.parentElement.remove(); updateNums();">-</button>
        `;
        container.appendChild(row);
        updateNums();
        if(data.defect) { setTimeout(() => autoResize(document.getElementById(`defect-${id}`)), 10); matchATA(id); }
    }

    function updateNums() {
        document.querySelectorAll('.idx-num').forEach((el, i) => el.innerText = (i + 1) + '.');
    }

    function setAsAp(id, type) {
        const row = document.getElementById(`row-${id}`);
        row.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(`asAp-${id}`).value = type;
    }

    function matchATA(id) {
        const text = document.getElementById(`defect-${id}`).value.toUpperCase();
        const ataInput = document.getElementById(`ata-${id}`);
        let found = DB.ataDatabase.find(item => text.includes(item.keyword));
        if (found && !ataInput.value) ataInput.value = found.code;
        checkATA(id, found ? found.code : null);
    }

    function checkATA(id, suggested = null) {
        const val = document.getElementById(`ata-${id}`).value.trim();
        const warn = document.getElementById(`warning-${id}`);
        if (!suggested) {
            const text = document.getElementById(`defect-${id}`).value.toUpperCase();
            let found = DB.ataDatabase.find(item => text.includes(item.keyword));
            suggested = found ? found.code : null;
        }
        warn.style.display = (val && suggested && val !== suggested) ? "block" : "none";
    }

    function swapLegs() {
        const f = document.getElementById('legFrom'), t = document.getElementById('legTo');
        [f.value, t.value] = [t.value, f.value];
        t.dispatchEvent(new Event('input'));
    }

    document.getElementById('legTo').addEventListener('input', () => {
        const route = document.getElementById('legFrom').value.toUpperCase() + "-" + document.getElementById('legTo').value.toUpperCase();
        if (DB.flights[route]) document.getElementById('flightNo').value = DB.flights[route];
    });

    window.onload = () => { loadDB(); addRow(); };

    document.body.addEventListener('paste', (e) => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf("image") !== -1);
        if (item) {
            fileToUpload = item.getAsFile();
            const url = URL.createObjectURL(fileToUpload);
            document.getElementById('pasteArea').innerHTML = `
                <button class="btn-reset-all" onclick="location.reload()">✖</button>
                <img src="${url}" onclick="document.getElementById('modalImg').src='${url}'; document.getElementById('imageModal').style.display='flex'">
            `;
        }
    });

    async function extractText() {
        if (!fileToUpload) return alert("사진을 먼저 붙여넣으세요!");
        const btn = document.querySelector('.btn-extract');
        btn.innerText = "분석 중... ⏳";
        const formData = new FormData();
        formData.append("file", fileToUpload);
        try {
            const res = await fetch("/ocr", { method: "POST", body: formData });
            const data = await res.json();
            document.getElementById('regNo').value = (data.regNo || "").replace(/^HL/, "");
            document.getElementById('legFrom').value = data.legFrom || "";
            document.getElementById('legTo').value = data.legTo || "";
            document.getElementById('legTo').dispatchEvent(new Event('input'));
            document.getElementById('defectRowsContainer').innerHTML = "";
            rowIdCounter = 0;
            if(data.items) data.items.forEach(item => addRow(item));
            else addRow();
        } catch (e) { alert("분석 실패"); }
        finally { btn.innerText = "✨ AI 분석 및 자동 매칭"; }
    }
</script>
</body>
</html>
