<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Log Scanner PRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --border: #dcdde1; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1300px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; color: var(--primary); }
        .top-section { display: flex; gap: 25px; margin-bottom: 20px; }
        
        .left-panel { flex: 1.2; display: flex; flex-direction: column; gap: 15px; }
        
        .static-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; align-items: center; background: white; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .input-group label { background: var(--primary); color: white; padding: 10px; font-weight: bold; font-size: 13px; width: 60px; text-align: center; }
        .input-group input[type="text"] { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; }
        
        .prefix { background: #e9ecef; color: #495057; font-weight: bold; padding: 10px; border-right: 1px solid var(--border); }
        
        /* 구간 (Leg) 스왑 버튼 추가 */
        .leg-inputs { display: flex; align-items: center; padding: 0 10px; }
        .leg-inputs input { width: 50px; text-align: center; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid var(--border) !important; border-radius: 0; padding: 5px; }
        .btn-swap { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--primary); padding: 0 5px; font-weight: bold; transition: 0.2s; }
        .btn-swap:hover { color: var(--secondary); transform: scale(1.1); }

        .dynamic-container { border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: white; }
        .dynamic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        .btn-add { background: var(--secondary); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        
        .defect-row { display: grid; grid-template-columns: 100px 1fr 140px 70px 30px; gap: 10px; align-items: start; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
        .defect-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .idx-wrapper { display: flex; align-items: center; gap: 8px; }
        .idx-num { font-weight: bold; color: var(--secondary); font-size: 14px; width: 15px;}
        .toggle-box { display: flex; border: 1px solid var(--primary); border-radius: 4px; overflow: hidden; height: 32px; width: 70px;}
        .toggle-btn { flex: 1; background: white; color: var(--primary); border: none; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s; padding: 0;}
        .toggle-btn.active { background: var(--primary); color: white; }

        .defect-row input[type="text"], .defect-row textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 8px; box-sizing: border-box; font-size: 13px; }
        .defect-row textarea { resize: vertical; min-height: 40px; }
        .btn-remove { background: #e74c3c; color: white; border: none; border-radius: 4px; height: 32px; font-weight: bold; cursor: pointer; }

        .right-panel { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }
        #pasteArea { flex: 1; border: 2px dashed #bdc3c7; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fafbfc; cursor: pointer; color: #7f8c8d; font-weight: bold; overflow: hidden; min-height: 300px; text-align: center; }
        #pasteArea img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-extract { background: #27ae60; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .bottom-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 10px; }
        .btn-mail { color: white; border: none; padding: 15px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-mail:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .bg-occ { background: #2980b9; }  
        .bg-icn { background: #16a085; }  
        .bg-gmp { background: #8e44ad; }  
        .bg-duty { background: #e67e22; } 
    </style>
</head>
<body>

<div class="main-container">
    <div class="header"><h2>✈️ AI Log Scanner PRO</h2></div>

    <div class="top-section">
        <div class="left-panel">
            <div class="static-fields">
                <div class="input-group"><label>기번</label><input type="text" id="regNo"></div>
                <div class="input-group" style="background:transparent; border:none;">
                    <label style="border-radius:4px 0 0 4px">위탁</label>
                    <div style="padding-left:15px; display:flex; align-items:center;">
                        <input type="checkbox" id="handover" style="width:20px; height:20px;">
                    </div>
                </div>
                <div class="input-group">
                    <label>구간</label>
                    <div class="leg-inputs">
                        <input type="text" id="legFrom" maxlength="3" placeholder="FROM">
                        <button class="btn-swap" onclick="swapLegs()" title="구간 바꾸기">⇄</button>
                        <input type="text" id="legTo" maxlength="3" placeholder="TO">
                    </div>
                </div>
                <div class="input-group">
                    <label>편명</label>
                    <span class="prefix">OZ</span>
                    <input type="text" id="flightNo">
                </div>
            </div>

            <div class="dynamic-container">
                <div class="dynamic-header">
                    <span>결함 및 조치내역 (DEFER 항목 전용)</span>
                    <button class="btn-add" onclick="addRow()">+</button>
                </div>
                <div id="defectRowsContainer"></div>
            </div>
        </div>

        <div class="right-panel">
            <div id="pasteArea">📋<br>여기를 클릭하고 이미지를 붙여넣으세요</div>
            <button class="btn-extract" onclick="extractText()">✨ AI 데이터 추출 및 분류</button>
        </div>
    </div>

    <div class="bottom-section">
        <button class="btn-mail bg-occ" onclick="alert('OCC 전송')">DISPATCH APPROVAL<br>TO OCC</button>
        <button class="btn-mail bg-icn" onclick="alert('ICN 전송')">DISPATCH APPROVAL<br>TO ICN</button>
        <button class="btn-mail bg-gmp" onclick="alert('GMP 전송')">DISPATCH APPROVAL<br>TO GMP</button>
        <button class="btn-mail bg-duty" onclick="alert('DUTY 전송')">DEFER 전송<br>TO DUTY</button>
    </div>
</div>

<script>
    let fileToUpload = null;
    let rowIdCounter = 0;

    const DB = {
        flights: { "ICN-SFO": "212", "SFO-ICN": "211", "ICN-LAX": "202" },
        ata: { "INTERPHONE": "23", "TIRE": "32", "BRAKE": "32" }
    };

    function addRow(data = {}) {
        rowIdCounter++;
        const id = rowIdCounter;
        const container = document.getElementById('defectRowsContainer');
        const row = document.createElement('div');
        row.className = 'defect-row';
        row.id = `row-${id}`;
        
        const isAp = data.asAp === 'AP';
        const asClass = isAp ? '' : 'active';
        const apClass = isAp ? 'active' : '';
        const hiddenVal = isAp ? 'AP' : 'AS';

        row.innerHTML = `
            <div class="idx-wrapper">
                <span class="idx-num"></span>
                <div class="toggle-box">
                    <button type="button" class="toggle-btn ${asClass}" id="btn-as-${id}" onclick="setAsAp(${id}, 'AS')">AS</button>
                    <button type="button" class="toggle-btn ${apClass}" id="btn-ap-${id}" onclick="setAsAp(${id}, 'AP')">AP</button>
                </div>
                <input type="hidden" id="asAp-${id}" value="${hiddenVal}">
            </div>
            <textarea id="defect-${id}" placeholder="DEFECT 내용" oninput="matchATA(${id})">${data.defect || ''}</textarea>
            <input type="text" id="reason-${id}" placeholder="적용근거" value="${data.reason || ''}">
            <input type="text" id="ata-${id}" placeholder="ATA" value="${data.ata || ''}">
            <button class="btn-remove" onclick="removeRow(${id})">-</button>
        `;
        container.appendChild(row);
        updateRowNumbers();
    }

    function removeRow(id) {
        const rows = document.querySelectorAll('.defect-row');
        if(rows.length <= 1) return alert("최소 1개의 항목은 필요합니다.");
        document.getElementById(`row-${id}`).remove();
        updateRowNumbers();
    }

    function updateRowNumbers() {
        document.querySelectorAll('.defect-row').forEach((row, index) => {
            row.querySelector('.idx-num').innerText = `${index + 1}.`;
        });
    }

    function setAsAp(id, type) {
        document.getElementById(`btn-as-${id}`).classList.remove('active');
        document.getElementById(`btn-ap-${id}`).classList.remove('active');
        document.getElementById(`btn-${type.toLowerCase()}-${id}`).classList.add('active');
        document.getElementById(`asAp-${id}`).value = type;
    }

    // --- 구간 스왑 기능 (⇄ 버튼) ---
    function swapLegs() {
        const fromInput = document.getElementById('legFrom');
        const toInput = document.getElementById('legTo');
        const temp = fromInput.value;
        fromInput.value = toInput.value;
        toInput.value = temp;
        // 편명 재계산을 위해 이벤트 발생
        toInput.dispatchEvent(new Event('input'));
    }

    document.getElementById('legFrom').addEventListener('input', function() {
        if(this.value.length === 3) document.getElementById('legTo').focus();
    });
    
    document.getElementById('legTo').addEventListener('input', function() {
        if(this.value.length === 3) {
            const route = document.getElementById('legFrom').value.toUpperCase() + "-" + this.value.toUpperCase();
            if(DB.flights[route]) document.getElementById('flightNo').value = DB.flights[route];
        }
    });

    function matchATA(id) {
        const text = document.getElementById(`defect-${id}`).value.toUpperCase();
        for (const [key, val] of Object.entries(DB.ata)) {
            if (text.includes(key)) {
                document.getElementById(`ata-${id}`).value = val;
                break;
            }
        }
    }

    window.onload = () => addRow();

    document.getElementById('pasteArea').addEventListener('paste', (e) => {
        e.preventDefault();
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (const item of items) {
            if (item.type.indexOf("image") !== -1) {
                fileToUpload = item.getAsFile();
                const url = URL.createObjectURL(fileToUpload);
                document.getElementById('pasteArea').innerHTML = `<img src="${url}">`;
                break;
            }
        }
    });

    async function extractText() {
        if (!fileToUpload) return alert("이미지를 먼저 붙여넣으세요!");
        const btn = document.querySelector('.btn-extract');
        btn.innerText = "데이터 분석 중... ⏳";
        
        const formData = new FormData();
        formData.append("file", fileToUpload);

        try {
            const res = await fetch("/ocr", { method: "POST", body: formData });
            const data = await res.json();
            
            if(data.error) throw new Error(data.error);

            document.getElementById('regNo').value = data.regNo || "";
            // 위탁은 수동이므로 건드리지 않음
            
            document.getElementById('legFrom').value = data.legFrom || "";
            document.getElementById('legTo').value = data.legTo || "";
            document.getElementById('legTo').dispatchEvent(new Event('input'));

            document.getElementById('defectRowsContainer').innerHTML = "";
            
            if(data.items && data.items.length > 0) {
                data.items.forEach(item => addRow(item));
            } else {
                addRow();
                alert("DEFER가 적용된 결함을 찾을 수 없습니다."); // 사용자를 위한 안내
            }
        } catch (e) {
            alert("서버 통신 실패: " + e.message);
        } finally {
            btn.innerText = "✨ AI 데이터 추출 및 분류";
        }
    }
</script>
</body>
</html>
