<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Log Scanner PRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --border: #ced4da; --bg: #f4f7f6; --warning: #e67e22; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1350px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); position: relative; }
        
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; color: var(--primary); }
        .top-section { display: flex; gap: 25px; margin-bottom: 20px; }
        
        .left-panel { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }
        
        /* 🎯 상단 고정 필드 칼각 정렬 (비율 재조정: 구간 줄이고 위탁 늘림) */
        .static-fields { display: grid; grid-template-columns: 1fr 1fr 1.3fr 0.7fr; gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; font-weight: bold; color: var(--primary); padding-left: 2px; line-height: 1; }
        
        .input-group .box { display: flex; background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; height: 40px; box-sizing: border-box; align-items: center; }
        .input-group input[type="text"] { flex: 1; border: none; padding: 0 10px; outline: none; font-size: 14px; height: 100%; background: transparent; min-width: 0; }
        
        /* 위탁 박스 복구 */
        .checkbox-box { justify-content: center; cursor: pointer; }
        .checkbox-box input[type="checkbox"] { width: 20px; height: 20px; margin: 0; cursor: pointer; }
        
        .prefix { background: #e9ecef; color: #495057; font-weight: bold; padding: 0 12px; font-size: 13px; border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; height: 100%; box-sizing: border-box; }
        
        /* 구간 텍스트 잘림 방지 */
        .leg-box { padding: 0 5px; justify-content: space-between; }
        .leg-box input { flex: 1; min-width: 40px; text-align: center; font-weight: bold; text-transform: uppercase; padding: 0; font-size: 13px; }
        .btn-swap { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--primary); padding: 0 5px; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* 동적 결함 영역 */
        .dynamic-container { border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: white; }
        .dynamic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        .btn-add { background: var(--secondary); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* 🎯 결함 제목줄 (헤더) 생성 */
        .defect-header-row { display: grid; grid-template-columns: 100px 1fr 160px 100px 35px; gap: 12px; padding: 0 5px; margin-bottom: 5px; }
        .defect-header-row span { font-size: 11px; font-weight: bold; color: #7f8c8d; padding-left: 2px; }

        /* 결함 Row 디자인 (라벨 제거로 인한 여백 축소) */
        .defect-row { display: grid; grid-template-columns: 100px 1fr 160px 100px 35px; gap: 12px; align-items: start; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed var(--border); }
        .defect-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .row-item { display: flex; flex-direction: column; position: relative; }
        
        /* 🎯 토글 박스 및 넘버링 위치 조정 */
        .toggle-box { display: flex; border: 1px solid var(--primary); border-radius: 4px; overflow: hidden; height: 38px; flex: 1; }
        .toggle-btn { flex: 1; background: white; color: var(--primary); border: none; font-weight: bold; font-size: 12px; cursor: pointer; }
        .toggle-btn.active { background: var(--primary); color: white; }

        .row-item input, .row-item textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 8px; box-sizing: border-box; font-size: 13px; min-height: 38px; }
        .row-item input { height: 38px; }
        .row-item textarea { resize: none; overflow: hidden; line-height: 1.4; } 
        
        .ata-warning { color: var(--warning); font-size: 11px; font-weight: bold; position: absolute; bottom: -18px; left: 0; display: none; white-space: nowrap; }
        .btn-remove { background: #e74c3c; color: white; border: none; border-radius: 4px; height: 38px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 오른쪽 AI 및 사진 영역 */
        .right-panel { flex: 0.7; display: flex; flex-direction: column; gap: 15px; }
        #pasteArea { flex: 1; border: 2px dashed #bdc3c7; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fafbfc; color: #7f8c8d; font-weight: bold; overflow: hidden; min-height: 350px; text-align: center; position: relative; }
        
        #pasteArea img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; transition: opacity 0.2s; }
        #pasteArea img:hover { opacity: 0.8; }
        
        .btn-reset-all { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-reset-all:hover { background: #c0392b; transform: scale(1.1); }

        .btn-extract { background: #27ae60; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* 하단 버튼 */
        .bottom-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 10px; }
        .btn-mail { color: white; border: none; padding: 15px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-mail:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .bg-occ { background: #2980b9; }  
        .bg-icn { background: #16a085; }  
        .bg-gmp { background: #8e44ad; }  
        .bg-duty { background: #e67e22; } 

        /* 사진 확대 모달 창 CSS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out; }
        .modal-img { max-width: 90vw; max-height: 90vh; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header"><h2>✈️ AI Log Scanner PRO</h2></div>

    <div class="top-section">
        <div class="left-panel">
            <div class="static-fields">
                <div class="input-group">
                    <label>기번</label>
                    <div class="box"><span class="prefix">HL</span><input type="text" id="regNo"></div>
                </div>
                <div class="input-group">
                    <label>편명</label>
                    <div class="box"><span class="prefix">OZ</span><input type="text" id="flightNo"></div>
                </div>
                <div class="input-group">
                    <label>구간</label>
                    <div class="box leg-box">
                        <input type="text" id="legFrom" maxlength="3" placeholder="FROM">
                        <button class="btn-swap" onclick="swapLegs()">⇄</button>
                        <input type="text" id="legTo" maxlength="3" placeholder="TO">
                    </div>
                </div>
                <div class="input-group">
                    <label>위탁</label>
                    <div class="box checkbox-box" onclick="document.getElementById('handover').click();">
                        <input type="checkbox" id="handover" onclick="event.stopPropagation();">
                    </div>
                </div>
            </div>

            <div class="dynamic-container">
                <div class="dynamic-header">
                    <span>결함 및 조치내역 (DEFER 항목 전용)</span>
                    <button class="btn-add" onclick="addRow()">+</button>
                </div>
                
                <div class="defect-header-row">
                    <span style="text-align: center;">AS/AP</span>
                    <span>DEFECT</span>
                    <span>적용근거</span>
                    <span>ATA</span>
                    <span></span>
                </div>

                <div id="defectRowsContainer"></div>
            </div>
        </div>

        <div class="right-panel">
            <div id="pasteArea">📋<br>이미지를 붙여넣으세요 (Ctrl+V)</div>
            <button class="btn-extract" onclick="extractText()">✨ AI 데이터 분석 및 ATA 매칭</button>
        </div>
    </div>

    <div class="bottom-section">
        <button class="btn-mail bg-occ" onclick="alert('OCC 전송')">DISPATCH APPROVAL<br>TO OCC</button>
        <button class="btn-mail bg-icn" onclick="alert('ICN 전송')">DISPATCH APPROVAL<br>TO ICN</button>
        <button class="btn-mail bg-gmp" onclick="alert('GMP 전송')">DISPATCH APPROVAL<br>TO GMP</button>
        <button class="btn-mail bg-duty" onclick="alert('DUTY 전송')">DEFER 전송<br>TO DUTY</button>
    </div>
</div>

<div class="modal-overlay" id="imageModal" onclick="closeModal()">
    <img src="" class="modal-img" id="modalImg">
</div>

<script>
    let fileToUpload = null;
    let rowIdCounter = 0;

    const DB = {
        flights: { "ICN-SFO": "212", "SFO-ICN": "211", "ICN-LAX": "202" },
        ataDatabase: [
            { keyword: "INTERPHONE", code: "23" },
            { keyword: "TIRE", code: "32" },
            { keyword: "WHEEL", code: "32" },
            { keyword: "BRAKE", code: "32" },
            { keyword: "SEAT", code: "25" },
            { keyword: "OVEN", code: "25" },
            { keyword: "COFFEE", code: "25" },
            { keyword: "LIGHT", code: "33" },
            { keyword: "LAVATORY", code: "38" }
        ]
    };

    function autoResize(element) {
        element.style.height = '38px'; 
        element.style.height = (element.scrollHeight) + 'px'; 
    }

    function addRow(data = {}) {
        rowIdCounter++;
        const id = rowIdCounter;
        const container = document.getElementById('defectRowsContainer');
        const row = document.createElement('div');
        row.className = 'defect-row';
        row.id = `row-${id}`;
        
        const isAp = data.asAp === 'AP';
        const asClass = isAp ? '' : 'active';
        const apClass = isAp ? 'active' : '';
        const hiddenVal = isAp ? 'AP' : 'AS';

        // 🎯 개별 라벨 제거 & 번호를 버튼 상자 왼쪽(flex-row)에 딱 붙임
        row.innerHTML = `
            <div class="row-item" style="flex-direction: row; align-items: center; gap: 6px; height: 38px;">
                <span class="idx-num" style="font-weight: bold; color: var(--secondary); font-size: 14px; width: 15px; text-align: right;"></span>
                <div class="toggle-box">
                    <button type="button" class="toggle-btn ${asClass}" id="btn-as-${id}" onclick="setAsAp(${id}, 'AS')">AS</button>
                    <button type="button" class="toggle-btn ${apClass}" id="btn-ap-${id}" onclick="setAsAp(${id}, 'AP')">AP</button>
                </div>
                <input type="hidden" id="asAp-${id}" value="${hiddenVal}">
            </div>
            <div class="row-item">
                <textarea id="defect-${id}" oninput="autoResize(this); runATAMatching(${id});" placeholder="결함 내용 입력">${data.defect || ''}</textarea>
            </div>
            <div class="row-item">
                <input type="text" id="reason-${id}" value="${data.reason || ''}" placeholder="예: MEL 00-00">
            </div>
            <div class="row-item">
                <input type="text" id="ata-${id}" value="${data.ata || ''}" oninput="checkATAConflict(${id})" placeholder="ATA">
                <span id="warning-${id}" class="ata-warning">⚠️ DB와 상이(확인 요)</span>
            </div>
            <button class="btn-remove" onclick="removeRow(${id})">-</button>
        `;
        container.appendChild(row);
        
        updateRowNumbers();
        
        const textarea = document.getElementById(`defect-${id}`);
        setTimeout(() => autoResize(textarea), 10);
        
        if(data.defect) runATAMatching(id, data.ata);
    }

    function removeRow(id) {
        if(document.querySelectorAll('.defect-row').length <= 1) return;
        document.getElementById(`row-${id}`).remove();
        updateRowNumbers(); 
    }

    function updateRowNumbers() {
        document.querySelectorAll('.defect-row').forEach((row, index) => {
            row.querySelector('.idx-num').innerText = `${index + 1}.`;
        });
    }

    function setAsAp(id, type) {
        document.getElementById(`btn-as-${id}`).classList.toggle('active', type === 'AS');
        document.getElementById(`btn-ap-${id}`).classList.toggle('active', type === 'AP');
        document.getElementById(`asAp-${id}`).value = type;
    }

    function runATAMatching(id, loggedATA = null) {
        const text = document.getElementById(`defect-${id}`).value.toUpperCase();
        const ataInput = document.getElementById(`ata-${id}`);
        
        let suggestedATA = "";
        for (const item of DB.ataDatabase) {
            if (text.includes(item.keyword)) { suggestedATA = item.code; break; }
        }

        if (!ataInput.value && suggestedATA) {
            ataInput.value = suggestedATA;
        }

        checkATAConflict(id, suggestedATA);
    }

    function checkATAConflict(id, suggested = null) {
        const currentVal = document.getElementById(`ata-${id}`).value.trim();
        const warning = document.getElementById(`warning-${id}`);
        
        if (!suggested) {
            const text = document.getElementById(`defect-${id}`).value.toUpperCase();
            for (const item of DB.ataDatabase) {
                if (text.includes(item.keyword)) { suggested = item.code; break; }
            }
        }

        warning.style.display = (currentVal && suggested && currentVal !== suggested) ? "block" : "none";
    }

    function swapLegs() {
        const fromInput = document.getElementById('legFrom'), toInput = document.getElementById('legTo');
        [fromInput.value, toInput.value] = [toInput.value, fromInput.value];
        toInput.dispatchEvent(new Event('input'));
    }

    document.getElementById('legFrom').addEventListener('input', function() { if(this.value.length === 3) document.getElementById('legTo').focus(); });
    document.getElementById('legTo').addEventListener('input', function() {
        const route = document.getElementById('legFrom').value.toUpperCase() + "-" + this.value.toUpperCase();
        if(DB.flights[route]) document.getElementById('flightNo').value = DB.flights[route];
    });

    function openModal(imgSrc) {
        document.getElementById('modalImg').src = imgSrc;
        document.getElementById('imageModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
        document.getElementById('modalImg').src = '';
    }

    function resetForm(event) {
        if(event) event.stopPropagation();
        
        fileToUpload = null;
        document.getElementById('pasteArea').innerHTML = `📋<br>이미지를 붙여넣으세요 (Ctrl+V)`;
        
        document.getElementById('regNo').value = '';
        document.getElementById('handover').checked = false;
        document.getElementById('legFrom').value = '';
        document.getElementById('legTo').value = '';
        document.getElementById('flightNo').value = '';
        
        document.getElementById('defectRowsContainer').innerHTML = "";
        rowIdCounter = 0;
        addRow();
    }

    window.onload = () => addRow();

    document.body.addEventListener('paste', (e) => {
        const item = Array.from((e.clipboardData || e.originalEvent.clipboardData).items).find(x => x.type.indexOf("image") !== -1);
        if (item) {
            fileToUpload = item.getAsFile();
            const imgUrl = URL.createObjectURL(fileToUpload);
            document.getElementById('pasteArea').innerHTML = `
                <button class="btn-reset-all" onclick="resetForm(event)" title="초기화">✖</button>
                <img src="${imgUrl}" onclick="openModal('${imgUrl}')" title="클릭하여 확대">
            `;
        }
    });

    async function extractText() {
        if (!fileToUpload) return alert("이미지를 먼저 붙여넣으세요!");
        const btn = document.querySelector('.btn-extract');
        btn.innerText = "분석 및 매칭 중... ⏳";
        btn.disabled = true;
        
        const formData = new FormData();
        formData.append("file", fileToUpload);

        try {
            const res = await fetch("/ocr", { method: "POST", body: formData });
            const data = await res.json();
            
            let reg = data.regNo || "";
            document.getElementById('regNo').value = reg.toUpperCase().replace(/^HL/, '').trim();
            
            document.getElementById('legFrom').value = data.legFrom || "";
            document.getElementById('legTo').value = data.legTo || "";
            document.getElementById('legTo').dispatchEvent(new Event('input'));

            document.getElementById('defectRowsContainer').innerHTML = "";
            rowIdCounter = 0; 
            
            if(data.items && data.items.length > 0) {
                data.items.forEach(item => addRow(item));
            } else { addRow(); alert("DEFER 항목을 찾지 못했습니다."); }
        } catch (e) { alert("통신 실패!"); }
        finally { 
            btn.innerText = "✨ AI 데이터 분석 및 ATA 매칭"; 
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
