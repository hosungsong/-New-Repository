<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Log Scanner PRO</title>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #3498db; --success: #27ae60;
            --danger: #e74c3c; --bg: #f1f3f5; --border: #dee2e6;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .layout { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-area { flex: 1.3; }
        .ai-area { flex: 0.7; display: flex; flex-direction: column; gap: 15px; }

        /* 상단 고정 필드 */
        .grid-header { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .field { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 4px; background: white; overflow: hidden; }
        .field label { width: 80px; background: var(--primary); color: white; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; }
        .field input { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; }

        /* 구간 & 편명 특수 */
        .leg-box { display: flex; align-items: center; gap: 5px; padding: 0 10px; }
        .leg-box input { width: 50px !important; text-align: center; border-bottom: 2px solid var(--border) !important; flex: none; font-weight: bold; }
        
        /* 동적 테이블 */
        .dynamic-section { border: 1px solid var(--primary); border-radius: 8px; overflow: hidden; }
        .section-bar { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: var(--secondary); border: none; color: white; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        .row-item { display: grid; grid-template-columns: 70px 1fr 150px 80px; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); background: white; }
        .row-item input, .row-item textarea { border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 13px; }
        .row-item textarea { height: 40px; resize: vertical; }

        /* AI 패널 */
        #pasteArea { flex: 1; border: 3px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fdfdfd; cursor: pointer; min-height: 300px; color: #adb5bd; font-weight: bold; text-align: center; overflow: hidden; }
        #pasteArea img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-run { background: var(--success); color: white; border: none; padding: 18px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-run:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 하단 버튼 */
        .footer-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .btn-send { background: #34495e; color: white; border: none; padding: 15px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-duty { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="layout">
        <div class="form-area">
            <div class="grid-header">
                <div class="field"><label>기번</label><input type="text" id="regNo"></div>
                <div class="field" style="background:transparent; border:none;">
                    <label style="border-radius:4px 0 0 4px">위탁</label>
                    <div style="padding-left:15px; display:flex; align-items:center;">
                        <input type="checkbox" id="handover" style="width:20px; height:20px;">
                    </div>
                </div>
                <div class="field">
                    <label>구간</label>
                    <div class="leg-box">
                        <input type="text" id="legFrom" maxlength="3" placeholder="ICN">
                        <span>▶</span>
                        <input type="text" id="legTo" maxlength="3" placeholder="SFO">
                    </div>
                </div>
                <div class="field"><label>편명</label><input type="text" id="flightNo" readonly style="background:#eee;"></div>
            </div>

            <div class="dynamic-section">
                <div class="section-bar">
                    <span>결함 및 조치내역</span>
                    <button class="btn-add" onclick="addRow()">+</button>
                </div>
                <div id="rowContainer"></div>
            </div>
        </div>

        <div class="ai-area">
            <div id="pasteArea">클릭 후 이미지를 붙여넣으세요 (Ctrl+V)</div>
            <button class="btn-run" onclick="processAI()">✨ AI 데이터 자동 입력</button>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn-send" onclick="alert('OCC 전송')">DISPATCH APPROVAL<br>TO OCC</button>
        <button class="btn-send" onclick="alert('ICN 전송')">DISPATCH APPROVAL<br>TO ICN</button>
        <button class="btn-send" onclick="alert('GMP 전송')">DISPATCH APPROVAL<br>TO GMP</button>
        <button class="btn-send btn-duty" onclick="alert('DUTY 전송')">DEFER 전송<br>TO DUTY</button>
    </div>
</div>

<script>
    let pastedFile = null;
    let count = 0;

    // --- 엑셀 데이터 매칭용 DB ---
    const DB = {
        flights: { "ICN-SFO": "OZ212", "SFO-ICN": "OZ211", "ICN-LHR": "OZ521" },
        ata: { "INTERPHONE": "23", "TIRE": "32", "BRAKE": "32", "ENGINE": "72" }
    };

    function addRow() {
        count++;
        const container = document.getElementById('rowContainer');
        const div = document.createElement('div');
        div.className = 'row-item';
        div.innerHTML = `
            <input type="text" id="asAp-${count}" placeholder="AS/AP" style="text-align:center">
            <textarea id="defect-${count}" placeholder="DEFECT 내용" oninput="matchATA(${count})"></textarea>
            <input type="text" id="reason-${count}" placeholder="적용 근거">
            <input type="text" id="ata-${count}" placeholder="ATA">
        `;
        container.appendChild(div);
    }

    // 구간 자동 이동 및 편명 매칭
    document.getElementById('legFrom').addEventListener('input', function() {
        if(this.value.length === 3) document.getElementById('legTo').focus();
    });
    document.getElementById('legTo').addEventListener('input', function() {
        if(this.value.length === 3) {
            const route = document.getElementById('legFrom').value.toUpperCase() + "-" + this.value.toUpperCase();
            document.getElementById('flightNo').value = DB.flights[route] || "매칭없음";
        }
    });

    // ATA 자동 매칭
    function matchATA(id) {
        const text = document.getElementById(`defect-${id}`).value.toUpperCase();
        for (const [key, val] of Object.entries(DB.ata)) {
            if (text.includes(key)) {
                document.getElementById(`ata-${id}`).value = val;
                break;
            }
        }
    }

    // 이미지 붙여넣기
    document.getElementById('pasteArea').addEventListener('paste', (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (const item of items) {
            if (item.type.indexOf("image") !== -1) {
                pastedFile = item.getAsFile();
                const url = URL.createObjectURL(pastedFile);
                document.getElementById('pasteArea').innerHTML = `<img src="${url}">`;
            }
        }
    });

    // AI 프로세싱
    async function processAI() {
        if (!pastedFile) return alert("이미지를 먼저 붙여넣으세요.");
        const btn = document.querySelector('.btn-run');
        btn.innerText = "분석 중... ⏳";
        
        const formData = new FormData();
        formData.append("file", pastedFile);

        try {
            const res = await fetch("/ocr", { method: "POST", body: formData });
            const data = await res.json();

            document.getElementById('regNo').value = data.regNo || "";
            document.getElementById('handover').checked = data.isHandover || false;
            document.getElementById('legFrom').value = data.legFrom || "";
            document.getElementById('legTo').value = data.legTo || "";
            // 편명 자동 업데이트 트리거
            document.getElementById('legTo').dispatchEvent(new Event('input'));

            const container = document.getElementById('rowContainer');
            container.innerHTML = ""; count = 0;
            
            data.items.forEach(item => {
                addRow();
                document.getElementById(`asAp-${count}`).value = item.asAp;
                document.getElementById(`defect-${count}`).value = item.defect;
                document.getElementById(`reason-${count}`).value = item.reason;
                document.getElementById(`ata-${count}`).value = item.ata;
                matchATA(count);
            });
        } catch (e) { alert("분석 실패!"); }
        finally { btn.innerText = "✨ AI 데이터 자동 입력"; }
    }

    window.onload = addRow;
</script>
</body>
</html>
