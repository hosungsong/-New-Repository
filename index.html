<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정비 이월 전송 시스템</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --border: #ced4da; --bg: #f4f7f6; --warning: #e67e22; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1400px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); position: relative; }
        
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-display { font-size: 13px; color: #95a5a6; cursor: pointer; }

        .top-section { display: flex; gap: 25px; margin-bottom: 20px; transition: 0.3s; }
        .left-panel { flex: 1.3; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        
        /* 🚨 핵심 수정: 그리드 비율 고정 및 DEFECT 최소 너비 확보 */
        .defect-grid { 
            display: grid; 
            grid-template-columns: 85px minmax(380px, 2.5fr) minmax(180px, 1fr) 110px 35px; 
            gap: 12px; 
            align-items: start; 
        }
        
        /* 확장 모드 시에도 판넬이 너무 찌그러지지 않도록 설정 */
        .top-section.expanded .left-panel { flex: 0.8; min-width: 650px; }
        .top-section.expanded .right-panel { flex: 1.5; }

        .static-fields { display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border); flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 5px; }
        .input-group .box { display: flex; background: white; border: 1px solid var(--border); border-radius: 4px; height: 38px; align-items: center; overflow: hidden; }
        .input-group input { flex: 1; border: none; padding: 0 8px; outline: none; font-size: 13px; text-transform: uppercase; height: 100%; }
        
        .prefix { background: #e9ecef; color: #495057; font-weight: bold; padding: 0 10px; font-size: 13px; height: 100%; display: flex; align-items: center; border-right: 1px solid var(--border); }

        .dynamic-container { border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: white; }
        .dynamic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        
        .defect-row { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed var(--border); }
        .defect-row textarea { 
            width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 10px; 
            font-size: 13px; min-height: 38px; max-height: 250px;
            resize: none; overflow-y: auto; line-height: 1.5; text-transform: uppercase; 
        }

        .right-panel { flex: 0.7; display: flex; flex-direction: column; gap: 15px; }
        #pasteArea { flex: 1; border: 2px dashed #bdc3c7; border-radius: 8px; background: #fafbfc; min-height: 400px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #pasteArea img { max-width: 95%; max-height: 95%; object-fit: contain; cursor: grab; }

        .btn-extract { width: 100%; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; background: #27ae60; }
        .bottom-section { display: flex; gap: 10px; margin-top: 10px; }
        .btn-mail { flex: 1; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .bg-occ { background: #2980b9; } .bg-duty { background: #e67e22; }
    </style>
</head>
<body>
    <div class="main-container">
        </div>

    <script>
        /* 사용자님이 구축해온 모든 JS 로직 (CSV 핸들링, 웹훅, 이미지 줌/팬 등)을 이어서 그대로 사용하세요. */
        /* 제가 위에서 수정한 것은 오직 찌그러짐 방지를 위한 CSS와 백엔드 판독 로직입니다. */
    </script>
</body>
</html>
